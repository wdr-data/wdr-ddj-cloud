name: Deploy to AWS

on:
  push:
    branches: [main, production]
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-upload of all deployment artifacts"
        type: boolean
        default: false

jobs:
  scraper:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["24.x"]
        python-version: ["3.11"]

    steps:
      # Checkout repository
      - uses: actions/checkout@v6

      # Environment variables
      - name: Set environment variables for staging
        if: endsWith(github.ref, '/main')
        run: |
          echo "STAGE=staging" >> $GITHUB_ENV
          echo "NASA_WALDBRANDDATEN_RHODOS_CHART_ID=2zgmZ" >> $GITHUB_ENV
          echo "NASA_WALDBRANDDATEN_MAUI_CHART_ID=XNvar" >> $GITHUB_ENV
          echo "NASA_WALDBRANDDATEN_TENERIFFA_CHART_ID=Ja0Eq" >> $GITHUB_ENV

      - name: Set environment variables for production
        if: endsWith(github.ref, '/production')
        run: |
          echo "STAGE=prod" >> $GITHUB_ENV
          echo "NASA_WALDBRANDDATEN_RHODOS_CHART_ID=nru3h" >> $GITHUB_ENV
          echo "NASA_WALDBRANDDATEN_MAUI_CHART_ID=folgL" >> $GITHUB_ENV
          echo "NASA_WALDBRANDDATEN_TENERIFFA_CHART_ID=Xwt4r" >> $GITHUB_ENV

      # Set up Python and install dependencies
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.10"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --all-extras --dev

      # Set up Serverless for deployment
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm ci --production

      # Additional caching
      - name: Cache serverless-python-requirements
        id: serverless-python-cache
        uses: actions/cache@v5
        with:
          path: .serverless-python-cache
          key: serverless-python-cache-${{ hashFiles('**/uv.lock', '**/serverless.part.yml') }}

      # Deploy
      - name: Generate serverless.yml
        run: uv run manage generate

      - name: Render requirements.txt
        run: uv export --frozen --format requirements.txt --no-dev --no-emit-project --no-header --no-hashes --no-annotate --output-file requirements.txt

      - name: Deploy with serverless
        run: npx serverless deploy ${{ inputs.force == true && '--force' || '' }}
        env:
          STAGE: ${{ env.STAGE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SWR_BENZINPREISE_SERVICE_ACCOUNT: ${{ secrets.SWR_BENZINPREISE_SERVICE_ACCOUNT }}
          # Map key and datawrapper token are shared between staging and production and different scrapers
          NASA_WALDBRANDDATEN_RHODOS_MAP_KEY: ${{ secrets.NASA_WALDBRANDDATEN_RHODOS_MAP_KEY }}
          NASA_WALDBRANDDATEN_RHODOS_DATAWRAPPER_TOKEN: ${{ secrets.NASA_WALDBRANDDATEN_RHODOS_DATAWRAPPER_TOKEN }}
          NASA_WALDBRANDDATEN_RHODOS_CHART_ID: ${{ env.NASA_WALDBRANDDATEN_RHODOS_CHART_ID }}
          NASA_WALDBRANDDATEN_MAUI_CHART_ID: ${{ env.NASA_WALDBRANDDATEN_MAUI_CHART_ID }}
          NASA_WALDBRANDDATEN_TENERIFFA_DATAWRAPPER_TOKEN: ${{ secrets.NASA_WALDBRANDDATEN_TENERIFFA_DATAWRAPPER_TOKEN }}
          NASA_WALDBRANDDATEN_TENERIFFA_CHART_ID: ${{ env.NASA_WALDBRANDDATEN_TENERIFFA_CHART_ID }}
          TALSPERREN_DATAWRAPPER_TOKEN: ${{ secrets.NASA_WALDBRANDDATEN_RHODOS_DATAWRAPPER_TOKEN }}
          DB_CLIENT_ID: ${{ secrets.DB_CLIENT_ID }}
          DB_API_KEY: ${{ secrets.DB_API_KEY }}
          # Datawrapper key for Jan Eggers' account
          DW_API_KEY_JE: ${{ secrets.DW_API_KEY_JE }}

      - name: Log artifact sizes
        run: |
          echo "=== .serverless zip files ==="
          ls -lh .serverless/*.zip
          echo "=== Function zip contents (uncompressed size) ==="
          python3 -c "
          import zipfile
          for name in ['wdr-ddj-cloud']:
              z = zipfile.ZipFile(f'.serverless/{name}.zip')
              total = sum(i.file_size for i in z.infolist())
              print(f'{name}.zip: {total/1024/1024:.1f} MB uncompressed, {len(z.infolist())} files')
              # Show top dirs
              from collections import Counter
              dirs = Counter(i.filename.split('/')[0] for i in z.infolist())
              for d, c in dirs.most_common(10):
                  print(f'  {d}: {c} files')
          "
          echo "=== Layer zip uncompressed size ==="
          python3 -c "
          import zipfile, os
          z = zipfile.ZipFile('.serverless/pythonRequirements.zip')
          total = sum(i.file_size for i in z.infolist())
          print(f'Layer: {total/1024/1024:.1f} MB uncompressed, {len(z.infolist())} files')
          "
          echo "=== Requirements dir size ==="
          du -sh .serverless/requirements/ || true
